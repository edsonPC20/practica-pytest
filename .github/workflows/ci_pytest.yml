name: CI de Python Pytest

# Indica cuándo se debe ejecutar el workflow 
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    # Se ejecuta sobre una máquina virtual Ubuntu 
    runs-on: ubuntu-latest

    steps:
    # Paso 1: Clonar el repositorio 
    - name: Clonar el repositori
      uses: actions/checkout@v3

    # Paso 2: Configurar el entorno de Python 
    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    # Paso 3: Instalar dependencias necesarias 
    - name: Instal·lar dependències
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # Paso 4: Ejecutar las pruebas con Pytest 
    - name: Executar proves amb pytest
      run: pytest